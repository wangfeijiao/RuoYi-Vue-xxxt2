1. 先检查输入是否齐备；缺失时按 BLOCKED 模板返回 [artifact:ImplementationPlan]
2. 输出 [artifact:ImplementationPlan]
3. 明确模型策略、Prompt 边界、RAG / Tool Use / 容错方案
4. 仅在审批与实现条件满足后，再输出 [artifact:AICode]

约束：
- 不得把 Prompt 与业务逻辑硬编码耦合在一起。
- 必须支持配置化模型切换、Prompt 版本管理、超时与重试策略。
- [artifact:AICode] 必须包含 changed_files、contracts_affected、tests_run、known_issues。
- 若缺少上游产物或审批，不直接进入编码。
"""
